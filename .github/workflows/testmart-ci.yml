name: TestMart CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 — Backend checks
  # ---------------------------------------------------------------------------
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 5001
      MONGO_URI: mongodb://localhost:27017/testmart_ci
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Start backend server
        working-directory: backend
        run: node server.js &

      - name: Wait for backend to be ready
        run: npx wait-on http://127.0.0.1:5001/api/health --timeout 30000

  # ---------------------------------------------------------------------------
  # Job 2 — Playwright API tests
  # ---------------------------------------------------------------------------
  api-tests:
    name: Playwright API Tests
    runs-on: ubuntu-latest
    needs: backend
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 5001
      MONGO_URI: mongodb://localhost:27017/testmart_ci
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root (Playwright) dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Start backend server
        working-directory: backend
        run: node server.js &

      - name: Wait for backend to be ready
        run: npx wait-on http://127.0.0.1:5001/api/health --timeout 30000

      - name: Seed test users
        working-directory: backend
        run: node seedUser.js

      - name: Run Playwright API tests
        run: npm run test:api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: tests/playwright-report/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 3 — Frontend build check
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_STRIPE_PUBLISHABLE_KEY }}

  # ---------------------------------------------------------------------------
  # Job 4 — E2E Customer Journey
  # ---------------------------------------------------------------------------
  e2e-journey:
    name: E2E Customer Journey
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 5001
      MONGO_URI: mongodb://localhost:27017/testmart_ci
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Install all dependencies ──────────────────────────────────────────
      - name: Install root (Playwright) dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      # ── Install Playwright Chromium only ──────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # ── Start backend and seed database ───────────────────────────────────
      - name: Start backend server
        working-directory: backend
        run: node server.js &

      - name: Wait for backend to be ready
        run: npx wait-on http://127.0.0.1:5001/api/health --timeout 30000

      - name: Seed test users
        working-directory: backend
        run: node seedUser.js

      - name: Seed products
        working-directory: backend
        run: node seedProducts.js

      # ── Build frontend with Stripe key baked in ───────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_STRIPE_PUBLISHABLE_KEY }}

      # ── Serve frontend static build ───────────────────────────────────────
      - name: Install serve
        run: npm install -g serve

      - name: Serve frontend build
        run: serve -s frontend/build -l 3000 &

      - name: Wait for frontend to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      # ── Run E2E journey ───────────────────────────────────────────────────
      - name: Run E2E customer journey
        run: npm run test:journey

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Upload E2E test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-results
          path: test-results/
          retention-days: 7
